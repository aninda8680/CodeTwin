name: codetwin_app
description: "CodeTwin mobile app — remote control for the CodeTwin CLI agent."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.0.0

  # State
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Sockets
  socket_io_client: ^2.0.3+1

  # Notifications (local-only, no FCM)
  flutter_local_notifications: ^17.0.0

  # QR
  mobile_scanner: ^5.0.0
  qr_flutter: ^4.1.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0

  # Utilities
  package_info_plus: ^8.0.0
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
